name: sos_besoin
description: "Marketplace d'urgence - pros verifies, paiement sequestre."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Paiement
  flutter_stripe: ^10.2.0

  # Notifications push
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # UI & utilitaires
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  cached_network_image: ^3.3.1
  timeago: ^3.6.1
  intl: ^0.19.0
  uuid: ^4.4.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Stockage local
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700

